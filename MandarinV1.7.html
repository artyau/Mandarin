<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祈祈的普通話老師</title>
    
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.13.2/dist/index.min.js"></script>
    
    <style>
        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
            background-color: #fce4ec;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            padding-bottom: 50px; /* 底部留多點空間 */
            text-align: center;
        }

        h1 {
            color: #d81b60;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #880e4f;
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: normal;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 600px;
        }

        input[type="text"] {
            width: 80%;
            padding: 15px;
            font-size: 1.5rem;
            border: 3px solid #f8bbd0;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            color: #333;
        }

        input[type="text"]:focus {
            border-color: #d81b60;
        }

        /* 主按鈕樣式 */
        .btn-primary {
            background-color: #d81b60;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(216, 27, 96, 0.3);
            transition: transform 0.1s;
        }

        .btn-primary:active {
            transform: scale(0.95);
            background-color: #ad1457;
        }

        /* 結果顯示區域 */
        #result-area {
            margin-top: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px; 
        }

        /* 每一筆歷史紀錄的卡片樣式 */
        .history-row {
            background-color: #fff0f5; 
            border: 2px solid #f8bbd0;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between; 
            animation: fadeIn 0.5s ease-out; /* 改用淡入效果 */
        }

        /* 文字內容區塊 */
        .content-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            flex-grow: 1; 
        }

        /* 每一個「字+拼音」的方塊 */
        .char-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pinyin-text {
            font-size: 1.1rem;
            color: #880e4f;
            font-family: 'Arial', sans-serif;
            margin-bottom: -5px;
        }

        .chinese-text {
            font-size: 2.2rem;
            color: #d81b60;
            font-weight: bold;
            line-height: 1.2;
        }

        /* 每一行的小喇叭按鈕 */
        .row-speak-btn {
            background-color: #00897b;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 10px;
            flex-shrink: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .row-speak-btn:active {
            transform: scale(0.9);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>祈祈的普通話老師</h1>
        
        <p class="subtitle">請輸入妳想我讀的生字或句子</p>
        
        <input type="text" id="chineseInput" placeholder="輸入文字..." autocomplete="off">
        <br>
        <button class="btn-primary" onclick="startLearning()">朗讀</button>

        <div id="result-area"></div>
    </div>

    <script>
        function startLearning() {
            const inputField = document.getElementById('chineseInput');
            const text = inputField.value.trim();
            const resultArea = document.getElementById('result-area');

            if (!text) return; 

            try {
                if (typeof pinyinPro === 'undefined') return;

                // 1. 建立 Row
                const rowDiv = document.createElement('div');
                rowDiv.className = 'history-row';

                // 2. 建立內容容器
                const contentDiv = document.createElement('div');
                contentDiv.className = 'content-group';

                // 3. 處理拼音與文字
                const pinyinArray = pinyinPro.pinyin(text, { toneType: 'symbol', type: 'array' });
                const charArray = text.split('');

                charArray.forEach((char, index) => {
                    if(char.trim() === '') return;

                    const block = document.createElement('div');
                    block.className = 'char-block';

                    const pyDiv = document.createElement('div');
                    pyDiv.className = 'pinyin-text';
                    pyDiv.innerText = pinyinArray[index] || ''; 

                    const chDiv = document.createElement('div');
                    chDiv.className = 'chinese-text';
                    chDiv.innerText = char;

                    block.appendChild(pyDiv);
                    block.appendChild(chDiv);
                    contentDiv.appendChild(block);
                });

                // 4. 建立喇叭按鈕
                const speakBtn = document.createElement('button');
                speakBtn.className = 'row-speak-btn';
                speakBtn.innerHTML = '🔊';
                speakBtn.onclick = function() {
                    speakText(text);
                };

                rowDiv.appendChild(contentDiv);
                rowDiv.appendChild(speakBtn);

                // 5. 【修正重點】使用 appendChild 將新內容加到「底部」
                resultArea.appendChild(rowDiv);

                // 6. 【新增功能】自動捲動到最新的那一行，確保看得到
                rowDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });

            } catch (error) {
                console.error(error);
            }

            // 發音
            speakText(text);

            // 清空輸入框
            setTimeout(() => {
                inputField.value = '';
                inputField.focus();
            }, 100);
        }

        function speakText(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN'; 
            utterance.rate = 0.8; 
            window.speechSynthesis.speak(utterance);
        }

        document.getElementById('chineseInput').addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                startLearning();
            }
        });
    </script>

</body>
</html>
